name: Publish to NuGet

on:
  push:
    tags:
      - 'V*'

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  LIBRARY_PROJECT: CDS.ImageDisplay.OpenCvSharp4/CDS.ImageDisplay.OpenCvSharp4.csproj
  PACKAGE_ID: CDS.ImageDisplay.OpenCvSharp4

jobs:
  publish:
    name: Build & Release
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write

    environment: nuget

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history to compute version from tags

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ env.LIBRARY_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.LIBRARY_PROJECT }} --configuration Release --no-restore

      - name: Pack
        run: dotnet pack ${{ env.LIBRARY_PROJECT }} --configuration Release --no-build --output ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate with NuGet (Trusted Publishing)
        if: startsWith(github.ref, 'refs/tags/')
        id: nuget-auth
        run: |
          $oidcToken = (Invoke-RestMethod `
            -Uri "$env:ACTIONS_ID_TOKEN_REQUEST_URL&audience=nuget.org" `
            -Headers @{ Authorization = "Bearer $env:ACTIONS_ID_TOKEN_REQUEST_TOKEN" }
          ).value
          $response = Invoke-RestMethod `
            -Method POST `
            -Uri 'https://www.nuget.org/api/v2/token' `
            -Headers @{
              Authorization = "Bearer $oidcToken"
              'User-Agent'  = 'GitHubActions/1.0 (CDS.ImageDisplay.OpenCvSharp4)'
            } `
            -ContentType 'application/json' `
            -Body (ConvertTo-Json @{ username = 'JonShadforth'; tokenType = 'ApiKey' })
          Write-Host "::add-mask::$($response.apiKey)"
          "NUGET_TOKEN=$($response.apiKey)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Push to NuGet.org
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $pkg = (Get-ChildItem -Path ./artifacts -Filter "${{ env.PACKAGE_ID }}.*.nupkg").FullName
          dotnet nuget push $pkg --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_TOKEN --skip-duplicate

      - name: Push symbols to NuGet.org
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $pkg = (Get-ChildItem -Path ./artifacts -Filter "${{ env.PACKAGE_ID }}.*.snupkg").FullName
          if ($pkg) {
            dotnet nuget push $pkg --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_TOKEN --skip-duplicate
          }
